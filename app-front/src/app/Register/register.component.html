<div class="flex-1 flex items-center justify-center min-h-full">
  <div
    class="min-w-[50%] grid grid-rows-[auto_1fr_auto] bg-[var(--color-bgcard)] rounded-xl border-purple-900 border p-7"
  >
    <div>
      <app-logo></app-logo>
    </div>
    <div class="flex flex-col my-6">
      <div class="flex flex-col">
        <span class="text-2xl text-white">Create your account</span>
        <span class="text-sm text-[var(--text-gray)]"
          >Start your Journey with Workspace AI</span
        >
      </div>
      <form (ngSubmit)="onSubmitForm()" [formGroup]="registerForm">
        <div class="flex flex-col gap-2 text-white mt-5">
          <div>
            <app-input-validator
              labelText="First Name"
              placeholderText="Enter your first name"
              [controlObject]="firstName"
              [ruleToMessage]="getRuleToMessageText('First Name')"
            >
              <app-user-icon></app-user-icon>
            </app-input-validator>
          </div>
          <div>
            <app-input-validator
              labelText="Last Name"
              placeholderText="Enter your last name"
              [controlObject]="lastName"
              [ruleToMessage]="getRuleToMessageText('Last Name')"
            >
              <app-user-icon></app-user-icon>
            </app-input-validator>
          </div>
          <div>
            <app-input-validator
              labelText="Email"
              placeholderText="you@example.com"
              [controlObject]="email"
              [ruleToMessage]="getRuleToMessageEmail()"
            >
              <app-email-icon></app-email-icon>
            </app-input-validator>
          </div>
          <div>
            <app-input-validator
              labelText="Password"
              placeholderText="Create a password"
              [controlObject]="password"
              [ruleToMessage]="getRuleToMessagePassword()"
            >
              <app-lock-icon></app-lock-icon>
            </app-input-validator>
          </div>
        </div>
        <div>
          <button
            type="submit"
            class="px-5 py-2 bg-linear-to-r from-purple-600 to-blue-500 w-full rounded-lg justify-center mt-5"
          >
            <span class="text-white">Create Account</span>
          </button>
        </div>
      </form>
      <div class="flex justify-center text-xs gap-1 mt-4">
        <span class="text-[var(--text-gray)]">Already have an account?</span>
        <a
          href="https://youtu.be/dQw4w9WgXcQ?si=ao4sE-0dQLTjs1Rb"
          class="text-blue-600"
          >Sign in</a
        >
      </div>
    </div>
    <div class="flex">
      <span class="text-[var(--text-gray)] text-sm"
        >&#64;2026 Workspace AI. All rights reserved</span
      >
    </div>
  </div>
</div>
