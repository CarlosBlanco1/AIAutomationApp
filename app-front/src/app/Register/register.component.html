<div class="grid grid-rows-[auto_1fr_auto] bg-[var(--color-bgcard)] rounded-xl border-purple-900 border p-7">
    <div>
        <app-logo></app-logo>
    </div>
    <div class="flex flex-col my-6">
        <div class="flex flex-col">
            <span class="text-2xl text-white">Create your account</span>
            <span class="text-sm text-[var(--text-gray)]">Start your Journey with Workspace AI</span>
        </div>
        <div class="flex flex-col gap-8 text-white mt-5">
            <div class="flex flex-col">
                <label class="text-sm mb-2">First Name</label>
                <div class="flex items-center gap-2 border-gray-600 border rounded-md py-2 px-1">
                    <app-user-icon></app-user-icon>
                    <input class="text-sm" [value]="firstName" placeholder="Enter your first name" />
                </div>
            </div>
            <div class="flex flex-col">
                <label class="text-sm mb-2">Last Name</label>
                <div class="flex items-center gap-2 border-gray-600 border rounded-md py-2 px-1">
                    <app-user-icon></app-user-icon>
                    <input class="text-sm" [value]="lastName" placeholder="Enter your last name" />
                </div>
            </div>
            <div class="flex flex-col">
                <label class="text-sm mb-2">Email</label>
                <div class="flex items-center gap-2 border-gray-600 border rounded-md py-2 px-1">
                    <app-email-icon></app-email-icon>
                    <input class="text-sm" [value]="email" placeholder="you@example.com" />
                </div>
            </div>
            <div class="flex flex-col">
                <label class="text-sm mb-2">Password</label>
                <div class="flex items-center gap-2 border-gray-600 border rounded-md py-2 px-1">
                    <app-lock-icon></app-lock-icon>
                    <input class="text-sm" [value]="password" placeholder="Create a password" />
                </div>
            </div>
        </div>
        <div>
            <button class="px-5 py-2 bg-linear-to-r from-purple-600 to-blue-500 w-full rounded-lg justify-center mt-5">
                <span class="text-white">Create Account</span>
            </button>
        </div>
        <div class="flex justify-center text-xs gap-1 mt-4">
            <span class="text-[var(--text-gray)]">Already have an account?</span>
            <a href="https://youtu.be/dQw4w9WgXcQ?si=ao4sE-0dQLTjs1Rb" class="text-blue-600">Sign in</a>
        </div>
    </div>
    <div class="flex">
        <span class="text-[var(--text-gray)] text-sm">&#64;2026 Workspace AI. All rights reserved</span>
    </div>
</div>
