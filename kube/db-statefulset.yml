apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: workspaceai-postgres-ss
  namespace: workspaceai-prod
spec:
  serviceName: workspaceai-postgres-svc
  replicas: 1

  selector:
    matchLabels:
      app:  workspaceai-postgres-ss

  template:
    metadata:
      labels:
        app:  workspaceai-postgres-ss

    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_USER
              value: workspaceai_user

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-password
                  key: WORKSPACEAI_POSTGRES_PASSWORD

            - name: POSTGRES_DB
              value: workspaceai_db

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: workspaceai-postgres-pvc